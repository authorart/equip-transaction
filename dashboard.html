<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dashboard — Chest Equipment MSKH</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;-webkit-text-size-adjust:100%}
body{font-family:'Sarabun',sans-serif;background:#EEF2F7;color:#1A2B45;line-height:1.6;min-height:100vh}

/* ── Header ── */
.header{background:linear-gradient(135deg,#095E61,#0D7377);padding:14px 16px;
        display:flex;align-items:center;gap:12px;box-shadow:0 2px 10px rgba(0,0,0,.15);
        position:sticky;top:0;z-index:100}
.header-icon{font-size:24px}
.header-info{flex:1}
.header-title{font-size:17px;font-weight:800;color:#fff}
.header-sub{font-size:12px;color:rgba(255,255,255,.7)}
.header-btns{display:flex;gap:8px;align-items:center}
.btn-icon{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;
  padding:7px 10px;cursor:pointer;font-size:14px;font-family:'Sarabun',sans-serif}
.btn-icon:hover{background:rgba(255,255,255,.25)}

/* ── Landing (role selector) ── */
#landing{display:flex;flex-direction:column;align-items:center;padding:40px 20px 60px}
#landing .hero-icon{font-size:72px;margin-bottom:16px}
#landing h1{font-size:22px;font-weight:800;color:#1A2B45;margin-bottom:6px;text-align:center}
#landing p{font-size:14px;color:#64748B;margin-bottom:32px;text-align:center}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:400px}
.role-card{background:#fff;border:2px solid #D4DCE8;border-radius:16px;padding:22px 16px;
  text-align:center;cursor:pointer;transition:all .15s}
.role-card:hover{border-color:#0D7377;background:#F0F9F9}
.role-card.full-width{grid-column:1/-1}
.role-icon{font-size:36px;margin-bottom:8px}
.role-name{font-size:15px;font-weight:800;color:#1A2B45}
.role-desc{font-size:12px;color:#64748B;margin-top:4px}

/* ── Tabs ── */
.tab-bar{display:flex;background:#fff;border-bottom:2px solid #E5E7EB;
  overflow-x:auto;scrollbar-width:none;position:sticky;top:56px;z-index:99}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:11px 16px;font-size:13px;font-weight:700;
  font-family:'Sarabun',sans-serif;color:#64748B;background:none;
  border:none;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap}
.tab-btn.active{color:#0D7377;border-bottom-color:#0D7377}

/* ── Page content ── */
.page-content{display:none;padding:16px 16px 70px;max-width:800px;margin:0 auto}
.page-content.active{display:block}

/* ── KPI cards ── */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
@media(min-width:480px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi-card{background:#fff;border-radius:12px;border:1px solid #E5E7EB;
  padding:14px 12px;text-align:center}
.kpi-icon{font-size:24px;margin-bottom:4px}
.kpi-val{font-size:26px;font-weight:800;line-height:1.1}
.kpi-lbl{font-size:12px;color:#64748B;margin-top:2px}

/* ── Section title ── */
.section-title{font-size:14px;font-weight:800;color:#64748B;
  text-transform:uppercase;letter-spacing:.06em;
  margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:#D4DCE8}

/* ── Cards ── */
.card{background:#fff;border-radius:12px;border:1px solid #D4DCE8;
  box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:10px;overflow:hidden}
.card-hd{padding:11px 14px;background:#F8FAFC;border-bottom:1px solid #E5E7EB;
  display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-title{font-size:14px;font-weight:800;color:#1A2B45}
.card-body{padding:14px}

/* ── Equipment grid ── */
.eq-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:4px}
@media(min-width:480px){.eq-grid{grid-template-columns:repeat(3,1fr)}}
.eq-card{background:#fff;border:2px solid #D4DCE8;border-radius:12px;padding:14px 12px;cursor:default}
.eq-card.status-available{border-color:#86EFAC}
.eq-card.status-in_use{border-color:#93C5FD}
.eq-card.status-pending_approval{border-color:#FDE68A}
.eq-card.status-damaged,.eq-card.status-repair{border-color:#FCA5A5}
.eq-card.status-at_central,.eq-card.status-pending_sterilization{border-color:#67E8F9}
.eq-name{font-size:13px;font-weight:800;color:#1A2B45;margin-bottom:6px}
.eq-units{display:flex;flex-wrap:wrap;gap:4px}
.unit-dot{width:14px;height:14px;border-radius:3px;flex-shrink:0}
.unit-dot.available{background:#22C55E}
.unit-dot.in_use{background:#3B82F6}
.unit-dot.pending_approval{background:#EAB308}
.unit-dot.pending_admin_return{background:#A855F7}
.unit-dot.pending_sterilization{background:#06B6D4}
.unit-dot.at_central{background:#0EA5E9}
.unit-dot.damaged,.unit-dot.repair{background:#EF4444}
.unit-dot.disposed,.unit-dot.lost{background:#9CA3AF}
.eq-stat{font-size:12px;color:#64748B;margin-top:6px}
.eq-stat strong{color:#1A2B45}

/* ── Status badges ── */
.badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px}
.badge.pending{background:#FEF3C7;color:#92400E}
.badge.approved{background:#D1FAE5;color:#065F46}
.badge.rejected,.badge.auto_rejected{background:#FEE2E2;color:#7F1D1D}
.badge.cancelled{background:#F1F5F9;color:#475569}
.badge.in_use{background:#DBEAFE;color:#1E3A8A}
.badge.overdue{background:#FEE2E2;color:#7F1D1D}
.badge.ok{background:#D1FAE5;color:#065F46}
.badge.at_central{background:#E0F2FE;color:#075985}
.badge.pending_sterilization{background:#CFFAFE;color:#164E63}

/* ── Table ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:440px}
th{background:#0D7377;color:#fff;padding:9px 12px;text-align:left;font-size:12px;font-weight:700}
td{padding:9px 12px;border-bottom:1px solid #F1F5F9;vertical-align:top}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:#F8FAFC}

/* ── Timeline (sterilization pipeline) ── */
.pipeline-item{display:flex;gap:14px;margin-bottom:14px;align-items:flex-start}
.pipeline-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:16px;flex-shrink:0}
.pipeline-dot.sent{background:#FEF3C7}
.pipeline-dot.received{background:#CFFAFE}
.pipeline-dot.returned{background:#DBEAFE}
.pipeline-dot.ready{background:#D1FAE5}
.pipeline-body{flex:1}
.pipeline-title{font-size:14px;font-weight:800;color:#1A2B45}
.pipeline-sub{font-size:12px;color:#64748B;line-height:1.7}

/* ── Chart container ── */
.chart-wrap{background:#fff;border-radius:12px;border:1px solid #D4DCE8;
  padding:16px;margin-bottom:14px}
.chart-wrap canvas{max-height:200px}

/* ── Auth states ── */
#authLoading{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:60vh;gap:12px;color:#64748B;text-align:center;padding:20px}
#authError{display:none;flex-direction:column;align-items:center;justify-content:center;
  min-height:60vh;gap:12px;color:#B91C1C;text-align:center;padding:20px}
.spinner{width:36px;height:36px;border:3px solid #D4DCE8;border-top-color:#0D7377;
  border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-sm{width:18px;height:18px;border:2.5px solid #D4DCE8;border-top-color:#0D7377;
  border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.loading-inline{display:flex;align-items:center;gap:8px;color:#64748B;font-size:14px;padding:20px 0}

/* ── Date filter ── */
.date-filter{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.date-filter input{flex:1;min-width:120px;padding:8px 10px;border:2px solid #D4DCE8;
  border-radius:8px;font-size:13px;font-family:'Sarabun',sans-serif}
.date-filter input:focus{border-color:#0D7377;outline:none}
.date-filter button{padding:8px 14px;border:none;border-radius:8px;background:#0D7377;
  color:#fff;font-size:13px;font-weight:700;font-family:'Sarabun',sans-serif;cursor:pointer}

/* ── Legend ── */
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#374151}
.legend-dot{width:12px;height:12px;border-radius:2px;flex-shrink:0}

/* ── Empty state ── */
.empty-state{text-align:center;padding:30px;color:#94A3B8}
.empty-state .icon{font-size:36px;margin-bottom:8px}

/* ── Back button ── */
.btn-back{background:none;border:none;color:#0D7377;font-size:14px;font-weight:700;
  cursor:pointer;padding:0;display:flex;align-items:center;gap:4px;margin-bottom:14px}
</style>
</head>
<body>

<!-- ── Header (hidden until auth) ── -->
<div class="header" id="mainHeader" style="display:none">
  <div class="header-icon">📊</div>
  <div class="header-info">
    <div class="header-title">Chest Equipment Monitor</div>
    <div class="header-sub" id="headerSub">หน่วยโรคระบบการหายใจ · MSKH</div>
  </div>
  <div class="header-btns">
    <button class="btn-icon" onclick="refreshData()" title="รีเฟรช">🔄</button>
    <button class="btn-icon" onclick="showLanding()" title="เปลี่ยนบทบาท">🔀</button>
  </div>
</div>

<!-- ── Auth loading / error ── -->
<div id="authLoading"><div class="spinner"></div><div>กำลังเชื่อมต่อ...</div></div>
<div id="authError">
  <div style="font-size:48px">⚠️</div>
  <div style="font-size:17px;font-weight:800" id="authErrMsg">เกิดข้อผิดพลาด</div>
  <button class="btn-icon" style="background:#B91C1C;margin-top:12px" onclick="location.reload()">ลองใหม่</button>
</div>

<!-- ── Landing: role selector ── -->
<div id="landing" style="display:none">
  <div class="hero-icon">📊</div>
  <h1>Chest Equipment MSKH</h1>
  <p>เลือกบทบาทที่ต้องการดู Dashboard</p>
  <div class="role-grid" id="roleGrid">
    <!-- populated by JS based on auth -->
  </div>
</div>

<!-- ── Tab bar (hidden until role selected) ── -->
<div class="tab-bar" id="tabBar" style="display:none"></div>

<!-- ═══ USER VIEW ════════════════════════════════════════════ -->
<div class="page-content" id="view-user">
  <div id="user-content"><div class="loading-inline"><div class="spinner-sm"></div>กำลังโหลด...</div></div>
</div>

<!-- ═══ ADMIN VIEW ═══════════════════════════════════════════ -->
<div class="page-content" id="view-admin">
  <div class="date-filter">
    <input type="date" id="adminFrom">
    <input type="date" id="adminTo">
    <button onclick="loadAdminData()">กรอง</button>
  </div>
  <div id="admin-content"><div class="loading-inline"><div class="spinner-sm"></div>กำลังโหลด...</div></div>
</div>

<!-- ═══ CENTRAL VIEW ═════════════════════════════════════════ -->
<div class="page-content" id="view-central">
  <div id="central-content"><div class="loading-inline"><div class="spinner-sm"></div>กำลังโหลด...</div></div>
</div>

<!-- ═══ FULL VIEW (superadmin) ══════════════════════════════ -->
<div class="page-content" id="view-full">
  <div class="date-filter">
    <input type="date" id="fullFrom">
    <input type="date" id="fullTo">
    <button onclick="loadFullData()">กรอง</button>
  </div>
  <div id="full-content"><div class="loading-inline"><div class="spinner-sm"></div>กำลังโหลด...</div></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════
const LIFF_ID    = '2009365358-XIHw2A0N';
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby-ifmBtOFPgbrnODe6na-5NNGzIt9ae7-qu8X-wLxnp71vOtTihMY5s-Qxg-XvVEKU5w/exec';

let userId    = '';
let userAuth  = null; // { role, ward, name } or null
let curView   = '';

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async function() {
  // Set default dates
  const today = new Date();
  const d30   = new Date(Date.now()-30*86400000);
  ['adminFrom','fullFrom'].forEach(function(id){ const el=document.getElementById(id); if(el) el.value=isoDate(d30); });
  ['adminTo','fullTo'].forEach(function(id){ const el=document.getElementById(id); if(el) el.value=isoDate(today); });

  try {
    await liff.init({ liffId: LIFF_ID });
    if (liff.isLoggedIn()) {
      const profile = await liff.getProfile();
      userId        = profile.userId;
      // Auth check
      const r    = await fetch(SCRIPT_URL+'?action=checkAuth&userId='+encodeURIComponent(userId),{redirect:'follow'});
      const auth = await r.json();
      userAuth   = auth.success ? auth : null;
    }
  } catch(e) { /* LIFF not available — visitor mode */ }

  document.getElementById('authLoading').style.display = 'none';
  document.getElementById('mainHeader').style.display  = 'flex';
  showLanding();
});

// ═══════════════════════════════════════════════════════════════
//  LANDING — ROLE SELECTOR
// ═══════════════════════════════════════════════════════════════
function showLanding() {
  document.getElementById('tabBar').style.display     = 'none';
  document.querySelectorAll('.page-content').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('landing').style.display    = 'flex';

  const grid = document.getElementById('roleGrid');
  grid.innerHTML = '';

  // Everyone sees User/Public view
  grid.innerHTML += roleCard('👤','ดูสถานะอุปกรณ์','สำหรับทุกคน','user',false);

  if (userAuth) {
    if (userAuth.role === 'admin' || userAuth.role === 'superadmin') {
      grid.innerHTML += roleCard('🔑','Admin','อนุมัติ / ติดตาม','admin',false);
    }
    if (userAuth.role === 'central') {
      grid.innerHTML += roleCard('🏥','จ่ายกลาง','Sterilization pipeline','central',false);
    }
    if (userAuth.role === 'superadmin') {
      grid.innerHTML += roleCard('🛡️','Superadmin','ภาพรวมทั้งหมด','full',true);
    }
  }

  document.getElementById('headerSub').textContent = userAuth
    ? (userAuth.name + ' · ' + (userAuth.role==='superadmin'?'Superadmin':userAuth.role==='admin'?'Admin '+userAuth.ward:'จ่ายกลาง'))
    : 'หน่วยโรคระบบการหายใจ · MSKH';
}

function roleCard(icon, name, desc, role, fullWidth) {
  return `<div class="role-card${fullWidth?' full-width':''}" onclick="selectRole('${role}')">
    <div class="role-icon">${icon}</div>
    <div class="role-name">${name}</div>
    <div class="role-desc">${desc}</div>
  </div>`;
}

function selectRole(role) {
  document.getElementById('landing').style.display = 'none';
  curView = role;
  buildTabBar(role);
  document.getElementById('tabBar').style.display = 'flex';
  switchTab(role === 'full' ? 'overview' : role === 'admin' ? 'pending' : role);
}

// ═══════════════════════════════════════════════════════════════
//  TAB BAR
// ═══════════════════════════════════════════════════════════════
const TAB_CONFIG = {
  user    : [['user',    '📦 สถานะอุปกรณ์']],
  admin   : [['pending','⏳ รออนุมัติ'], ['loans','📋 กำลังยืม'], ['txn','📊 ประวัติ']],
  central : [['central','🔬 Sterilization']],
  full    : [['overview','📈 ภาพรวม'], ['approval','📋 Approval Log'], ['steril','🔬 Sterilization'], ['report','📊 รายงาน']],
};

function buildTabBar(role) {
  const bar  = document.getElementById('tabBar');
  bar.innerHTML = '';
  (TAB_CONFIG[role]||[]).forEach(function([id, label]) {
    bar.innerHTML += `<button class="tab-btn" id="tab-${id}" onclick="switchTab('${id}')">${label}</button>`;
  });
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.page-content').forEach(function(p){ p.classList.remove('active'); });
  const tabEl = document.getElementById('tab-'+tab);
  if (tabEl) tabEl.classList.add('active');

  // map tab → view container
  const viewMap = {
    user:'user', pending:'admin', loans:'admin', txn:'admin',
    central:'central', overview:'full', approval:'full', steril:'full', report:'full',
  };
  const viewId = 'view-'+(viewMap[tab]||tab);
  const viewEl = document.getElementById(viewId);
  if (viewEl) viewEl.classList.add('active');

  loadTabData(tab);
}

// ═══════════════════════════════════════════════════════════════
//  DATA LOADING
// ═══════════════════════════════════════════════════════════════
let cachedData = {};

function refreshData() { cachedData = {}; loadTabData(getCurrentTab()); }

function getCurrentTab() {
  const active = document.querySelector('.tab-btn.active');
  return active ? active.id.replace('tab-','') : '';
}

async function loadTabData(tab) {
  if (tab==='user')            await loadUserView();
  else if (tab==='pending' || tab==='loans' || tab==='txn') await loadAdminData();
  else if (tab==='central')    await loadCentralData();
  else if (tab==='overview' || tab==='approval' || tab==='steril' || tab==='report') await loadFullData();
}

async function apiFetch(action, params) {
  const qs  = Object.entries(params||{}).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
  const url = SCRIPT_URL+'?action='+action+'&userId='+encodeURIComponent(userId)+(qs?'&'+qs:'');
  const r   = await fetch(url,{redirect:'follow'});
  return r.json();
}

// ── USER VIEW ─────────────────────────────────────────────────
async function loadUserView() {
  if (cachedData.public && Date.now()-cachedData.publicTs < 60000) { renderUserView(cachedData.public); return; }
  document.getElementById('user-content').innerHTML = '<div class="loading-inline"><div class="spinner-sm"></div>กำลังโหลด...</div>';
  try {
    const resp = await apiFetch('getDashboardPublic');
    if (!resp.success) throw new Error(resp.error);
    cachedData.public   = resp.data;
    cachedData.publicTs = Date.now();
    renderUserView(resp.data);
  } catch(e) { document.getElementById('user-content').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div>'+e.message+'</div>'; }
}

function renderUserView(d) {
  // Count totals
  let available=0, inUse=0, other=0;
  d.statusCount && Object.entries(d.statusCount).forEach(([s,n]) => {
    if(s==='available') available+=n;
    else if(s==='in_use') inUse+=n;
    else other+=n;
  });
  const total = available+inUse+other;

  let html = `<div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-icon">📦</div><div class="kpi-val" style="color:#0D7377">${total}</div><div class="kpi-lbl">ชิ้นทั้งหมด</div></div>
    <div class="kpi-card"><div class="kpi-icon">✅</div><div class="kpi-val" style="color:#22C55E">${available}</div><div class="kpi-lbl">ว่างพร้อมใช้</div></div>
    <div class="kpi-card"><div class="kpi-icon">📋</div><div class="kpi-val" style="color:#3B82F6">${inUse}</div><div class="kpi-lbl">กำลังถูกยืม</div></div>
    <div class="kpi-card"><div class="kpi-icon">⏳</div><div class="kpi-val" style="color:#EAB308">${d.queueData?d.queueData.length:0}</div><div class="kpi-lbl">คิวรออยู่</div></div>
  </div>`;

  // Legend
  html += `<div class="legend">
    <div class="legend-item"><div class="legend-dot available"></div>ว่าง</div>
    <div class="legend-item"><div class="legend-dot in_use"></div>กำลังยืม</div>
    <div class="legend-item"><div class="legend-dot pending_approval"></div>รออนุมัติ</div>
    <div class="legend-item"><div class="legend-dot pending_admin_return"></div>รอรับคืน</div>
    <div class="legend-item"><div class="legend-dot at_central"></div>จ่ายกลาง</div>
    <div class="legend-item"><div class="legend-dot damaged"></div>ชำรุด/ซ่อม</div>
  </div>`;

  html += '<div class="section-title">สถานะอุปกรณ์</div><div class="eq-grid">';
  (d.equipment||[]).forEach(function(eq) {
    const avail  = eq.units.filter(u=>u.status==='available').length;
    const total2 = eq.units.length;
    const mainSt = avail>0 ? 'available' : eq.units.find(u=>u.status==='in_use') ? 'in_use' :
                   eq.units.find(u=>u.status==='pending_approval') ? 'pending_approval' : 'damaged';
    html += `<div class="eq-card status-${mainSt}">
      <div class="eq-name">${eq.equipmentName}</div>
      <div class="eq-units">${eq.units.map(u=>`<div class="unit-dot ${u.status}" title="${u.subId}: ${u.status}${u.borrowerName?' — '+u.borrowerName:''}"></div>`).join('')}</div>
      <div class="eq-stat"><strong>${avail}</strong>/${total2} ว่าง · ${eq.homeWard}</div>
    </div>`;
  });
  html += '</div>';

  // Queue
  if (d.queueData && d.queueData.length>0) {
    html += '<div class="section-title">คิวอุปกรณ์</div><div class="card"><div class="tbl-wrap"><table><tr><th>#</th><th>อุปกรณ์</th><th>ชื่อ</th><th>สถานะ</th></tr>';
    d.queueData.forEach(function(q){
      html += `<tr><td>${q.queuePos}</td><td>${q.equipmentId}</td><td>${q.name}</td><td><span class="badge ${q.status==='notified'?'in_use':'pending'}">${q.status==='notified'?'แจ้งแล้ว':'รออยู่'}</span></td></tr>`;
    });
    html += '</table></div></div>';
  }

  html += `<div style="font-size:12px;color:#94A3B8;text-align:center;margin-top:16px">อัปเดต: ${formatTime(d.lastUpdated)}</div>`;
  document.getElementById('user-content').innerHTML = html;
}

// ── ADMIN VIEW ────────────────────────────────────────────────
async function loadAdminData() {
  const from = document.getElementById('adminFrom')&&document.getElementById('adminFrom').value;
  const to   = document.getElementById('adminTo')&&document.getElementById('adminTo').value;
  const cacheKey = 'admin'+from+to;
  if (cachedData[cacheKey] && Date.now()-cachedData[cacheKey+'Ts']<60000) { renderAdminView(cachedData[cacheKey]); return; }
  document.getElementById('admin-content').innerHTML = '<div class="loading-inline"><div class="spinner-sm"></div>กำลังโหลด...</div>';
  try {
    const resp = await apiFetch('getDashboardAdmin', { fromDate:from||'', toDate:to||'' });
    if (!resp.success) throw new Error(resp.error);
    cachedData[cacheKey]       = resp.data;
    cachedData[cacheKey+'Ts']  = Date.now();
    renderAdminView(resp.data);
  } catch(e) { document.getElementById('admin-content').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div>'+e.message+'</div>'; }
}

function renderAdminView(d) {
  const tab = getCurrentTab();
  let html = `<div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-icon">⏳</div><div class="kpi-val" style="color:#EAB308">${d.kpi.pendingCount}</div><div class="kpi-lbl">รออนุมัติ</div></div>
    <div class="kpi-card"><div class="kpi-icon">📋</div><div class="kpi-val" style="color:#3B82F6">${d.kpi.activeCount}</div><div class="kpi-lbl">กำลังยืม</div></div>
    <div class="kpi-card"><div class="kpi-icon">🚨</div><div class="kpi-val" style="color:#EF4444">${d.kpi.overdueCount}</div><div class="kpi-lbl">เกินกำหนด</div></div>
    <div class="kpi-card"><div class="kpi-icon">↩️</div><div class="kpi-val" style="color:#8B5CF6">${d.kpi.returnCount}</div><div class="kpi-lbl">รอรับคืน</div></div>
  </div>`;

  if (tab==='pending' || tab==='admin') {
    html += '<div class="section-title">คำร้องรออนุมัติ</div>';
    if (d.pendingApprovals.length===0) { html += '<div class="empty-state"><div class="icon">✅</div>ไม่มีคำร้องรออนุมัติ</div>'; }
    else {
      html += '<div class="tbl-wrap"><table><tr><th>เวลา</th><th>อุปกรณ์</th><th>ผู้ขอ</th><th>Ward</th><th>เหลือ</th></tr>';
      d.pendingApprovals.forEach(function(r){
        const cls = r.minutesLeft<=30?'overdue':r.minutesLeft<=60?'pending':'ok';
        html += `<tr><td>${r.timestamp}</td><td>${r.equipmentSubId}</td><td>${r.requesterName}</td><td>${r.requesterWard}</td><td><span class="badge ${cls}">${r.minutesLeft>0?r.minutesLeft+' นาที':'หมดเวลา'}</span></td></tr>`;
      });
      html += '</table></div>';
    }
    if (d.pendingReturn.length>0) {
      html += '<div class="section-title">รอรับคืนจาก User</div><div class="tbl-wrap"><table><tr><th>อุปกรณ์</th><th>ผู้ยืม</th><th>Ward</th></tr>';
      d.pendingReturn.forEach(function(r){ html += `<tr><td>${r.equipmentSubId}</td><td>${r.borrowerName}</td><td>${r.ward}</td></tr>`; });
      html += '</table></div>';
    }
  }

  if (tab==='loans') {
    html += '<div class="section-title">อุปกรณ์กำลังถูกยืม</div>';
    if (d.activeLoans.length===0) { html += '<div class="empty-state"><div class="icon">✅</div>ไม่มีอุปกรณ์ที่ถูกยืมอยู่</div>'; }
    else {
      html += '<div class="tbl-wrap"><table><tr><th>อุปกรณ์</th><th>ผู้ยืม</th><th>Ward</th><th>คืนวันที่</th><th>สถานะ</th></tr>';
      d.activeLoans.forEach(function(l){
        const cls = l.isOverdue?'overdue':l.daysLeft<=1?'pending':'ok';
        const lbl = l.isOverdue?'เกิน '+(Math.abs(l.daysLeft))+' วัน':l.daysLeft===null?'-':l.daysLeft===0?'วันนี้':l.daysLeft+' วัน';
        html += `<tr><td>${l.equipmentSubId}<br><small style="color:#64748B">${l.homeWard}</small></td><td>${l.borrowerName}</td><td>${l.ward}</td><td>${l.expectedReturn}</td><td><span class="badge ${cls}">${lbl}</span></td></tr>`;
      });
      html += '</table></div>';
    }
  }

  if (tab==='txn') {
    html += '<div class="section-title">ประวัติธุรกรรม</div>';
    if (d.transactions.length===0) { html += '<div class="empty-state"><div class="icon">📋</div>ไม่มีข้อมูลในช่วงเวลาที่เลือก</div>'; }
    else {
      html += '<div class="tbl-wrap"><table><tr><th>เวลา</th><th>ประเภท</th><th>อุปกรณ์</th><th>ผู้ยืม</th><th>Ward</th></tr>';
      d.transactions.forEach(function(t){
        html += `<tr><td style="white-space:nowrap">${t.timestamp}</td><td><span class="badge ${t.type==='borrow'?'in_use':'approved'}">${t.type==='borrow'?'ยืม':'คืน'}</span></td><td>${t.equipmentSubId}</td><td>${t.borrowerName}</td><td>${t.ward}</td></tr>`;
      });
      html += '</table></div>';
    }
  }

  html += `<div style="font-size:12px;color:#94A3B8;text-align:center;margin-top:16px">อัปเดต: ${formatTime(d.lastUpdated)}</div>`;
  document.getElementById('admin-content').innerHTML = html;
}

// ── CENTRAL VIEW ──────────────────────────────────────────────
async function loadCentralData() {
  if (cachedData.central && Date.now()-cachedData.centralTs<60000) { renderCentralView(cachedData.central); return; }
  document.getElementById('central-content').innerHTML = '<div class="loading-inline"><div class="spinner-sm"></div>กำลังโหลด...</div>';
  try {
    const resp = await apiFetch('getDashboardCentral');
    if (!resp.success) throw new Error(resp.error);
    cachedData.central   = resp.data;
    cachedData.centralTs = Date.now();
    renderCentralView(resp.data);
  } catch(e) { document.getElementById('central-content').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div>'+e.message+'</div>'; }
}

function renderCentralView(d) {
  const stepIcon  = { sent_to_central:'📤', at_central:'🔬', returned_to_unit:'📦', ready:'✅' };
  const stepLabel = { sent_to_central:'ส่งมาแล้ว รอรับ', at_central:'อยู่ที่จ่ายกลาง', returned_to_unit:'ส่งคืนแล้ว รอ Admin รับ', ready:'เสร็จสิ้น' };
  const stepCls   = { sent_to_central:'sent', at_central:'received', returned_to_unit:'returned', ready:'ready' };

  let html = '<div class="section-title">Pipeline ปัจจุบัน</div>';
  if (!d.pipeline || d.pipeline.length===0) {
    html += '<div class="empty-state"><div class="icon">✅</div>ไม่มีอุปกรณ์ในกระบวนการ</div>';
  } else {
    d.pipeline.forEach(function(item){
      html += `<div class="card"><div class="card-hd">
        <div><div class="card-title">📦 ${item.equipmentSubId} — ${item.equipmentName}</div>
        <div style="font-size:12px;color:#64748B">🆔 ${item.sterilId}</div></div>
        <span class="badge ${item.status==='at_central'?'at_central':'pending_sterilization'}">${stepLabel[item.status]||item.status}</span>
      </div><div class="card-body">
        <div class="pipeline-item">
          <div class="pipeline-dot sent">${stepIcon.sent_to_central}</div>
          <div class="pipeline-body">
            <div class="pipeline-title">ส่งออกจาก Ward</div>
            <div class="pipeline-sub">โดย: ${item.sentBy||'-'} · ${item.sentTime||'-'}</div>
          </div>
        </div>
        ${item.centralReceivedBy?`<div class="pipeline-item">
          <div class="pipeline-dot received">${stepIcon.at_central}</div>
          <div class="pipeline-body">
            <div class="pipeline-title">จ่ายกลางรับแล้ว</div>
            <div class="pipeline-sub">โดย: ${item.centralReceivedBy} · ${item.centralReceivedTime}</div>
          </div>
        </div>`:''}
        ${item.centralReturnedBy?`<div class="pipeline-item">
          <div class="pipeline-dot returned">${stepIcon.returned_to_unit}</div>
          <div class="pipeline-body">
            <div class="pipeline-title">จ่ายกลางส่งคืนแล้ว</div>
            <div class="pipeline-sub">โดย: ${item.centralReturnedBy} · ${item.centralReturnTime}</div>
          </div>
        </div>`:''}
      </div></div>`;
    });
  }

  if (d.history && d.history.length>0) {
    html += '<div class="section-title">ประวัติล่าสุด (20 รายการ)</div><div class="tbl-wrap"><table><tr><th>อุปกรณ์</th><th>ส่งออก</th><th>รับกลับ</th><th>สภาพ</th></tr>';
    d.history.forEach(function(item){
      html += `<tr><td>${item.equipmentSubId}<br><small style="color:#64748B">${item.equipmentName}</small></td><td>${item.sentTime}</td><td>${item.unitReceivedTime||'-'}</td><td>${item.finalCondition||'-'}</td></tr>`;
    });
    html += '</table></div>';
  }

  html += `<div style="font-size:12px;color:#94A3B8;text-align:center;margin-top:16px">อัปเดต: ${formatTime(d.lastUpdated)}</div>`;
  document.getElementById('central-content').innerHTML = html;
}

// ── FULL VIEW (superadmin) ────────────────────────────────────
let chartInstances = {};
async function loadFullData() {
  const from = document.getElementById('fullFrom')&&document.getElementById('fullFrom').value;
  const to   = document.getElementById('fullTo')&&document.getElementById('fullTo').value;
  const cacheKey = 'full'+from+to;
  if (cachedData[cacheKey] && Date.now()-cachedData[cacheKey+'Ts']<60000) { renderFullView(cachedData[cacheKey]); return; }
  document.getElementById('full-content').innerHTML = '<div class="loading-inline"><div class="spinner-sm"></div>กำลังโหลด...</div>';
  try {
    const resp = await apiFetch('getDashboardFull', { fromDate:from||'', toDate:to||'' });
    if (!resp.success) throw new Error(resp.error);
    cachedData[cacheKey]       = resp.data;
    cachedData[cacheKey+'Ts']  = Date.now();
    renderFullView(resp.data);
  } catch(e) { document.getElementById('full-content').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div>'+e.message+'</div>'; }
}

function renderFullView(d) {
  const tab = getCurrentTab();

  if (tab==='overview') {
    const sc = d.statusSummary||{};
    const total = d.totalUnits||0;
    let html = `<div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-icon">📦</div><div class="kpi-val" style="color:#0D7377">${total}</div><div class="kpi-lbl">ชิ้นทั้งหมด</div></div>
      <div class="kpi-card"><div class="kpi-icon">✅</div><div class="kpi-val" style="color:#22C55E">${sc.available||0}</div><div class="kpi-lbl">ว่าง</div></div>
      <div class="kpi-card"><div class="kpi-icon">📋</div><div class="kpi-val" style="color:#3B82F6">${sc.in_use||0}</div><div class="kpi-lbl">กำลังยืม</div></div>
      <div class="kpi-card"><div class="kpi-icon">📈</div><div class="kpi-val" style="color:#8B5CF6">${d.utilRate||0}%</div><div class="kpi-lbl">Utilization</div></div>
    </div>`;

    // Approval stats
    const as = d.aprStats||{};
    html += `<div class="section-title">สถิติการอนุมัติ (ช่วงที่เลือก)</div><div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-icon">⏳</div><div class="kpi-val" style="color:#EAB308">${as.pending||0}</div><div class="kpi-lbl">Pending</div></div>
      <div class="kpi-card"><div class="kpi-icon">✅</div><div class="kpi-val" style="color:#22C55E">${as.approved||0}</div><div class="kpi-lbl">Approved</div></div>
      <div class="kpi-card"><div class="kpi-icon">❌</div><div class="kpi-val" style="color:#EF4444">${(as.rejected||0)+(as.auto_rejected||0)}</div><div class="kpi-lbl">Rejected</div></div>
      <div class="kpi-card"><div class="kpi-icon">🚫</div><div class="kpi-val" style="color:#64748B">${as.cancelled||0}</div><div class="kpi-lbl">Cancelled</div></div>
    </div>`;

    // Ward summary
    html += '<div class="section-title">สถิติแยก Ward</div><div class="tbl-wrap"><table><tr><th>Ward</th><th>ทั้งหมด</th><th>ว่าง</th><th>ยืม</th><th>อื่นๆ</th><th>Util%</th></tr>';
    Object.entries(d.wardSummary||{}).forEach(function([ward,ws]){
      const util = ws.total>0 ? Math.round(ws.inUse/ws.total*100) : 0;
      html += `<tr><td>${ward}</td><td>${ws.total}</td><td>${ws.available}</td><td>${ws.inUse}</td><td>${ws.other}</td><td>${util}%</td></tr>`;
    });
    html += '</table></div>';

    // Daily chart
    if (d.dailyChart && d.dailyChart.length>0) {
      html += '<div class="section-title">กราฟยืม/คืนรายวัน</div><div class="chart-wrap"><canvas id="dailyChart"></canvas></div>';
    }

    html += `<div style="font-size:12px;color:#94A3B8;text-align:center;margin-top:12px">อัปเดต: ${formatTime(d.lastUpdated)}</div>`;
    document.getElementById('full-content').innerHTML = html;

    // Render chart after DOM update
    if (d.dailyChart && d.dailyChart.length>0) {
      setTimeout(function(){
        const ctx = document.getElementById('dailyChart');
        if (!ctx) return;
        if (chartInstances.daily) chartInstances.daily.destroy();
        chartInstances.daily = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: d.dailyChart.map(function(r){ return r.date.slice(5); }),
            datasets: [
              { label:'ยืม', data: d.dailyChart.map(function(r){ return r.borrow; }), backgroundColor:'#3B82F6', borderRadius:3 },
              { label:'คืน', data: d.dailyChart.map(function(r){ return r.return; }), backgroundColor:'#22C55E', borderRadius:3 },
            ],
          },
          options: { responsive:true, plugins:{ legend:{ position:'top' } }, scales:{ y:{ beginAtZero:true, ticks:{ stepSize:1 } } } },
        });
      }, 100);
    }
  }

  if (tab==='approval') {
    let html = '<div class="section-title">Approval Log ล่าสุด</div>';
    if (!d.aprRecent || d.aprRecent.length===0) { html += '<div class="empty-state"><div class="icon">📋</div>ไม่มีข้อมูล</div>'; }
    else {
      html += '<div class="tbl-wrap"><table><tr><th>เวลา</th><th>Request ID</th><th>อุปกรณ์</th><th>ผู้ขอ</th><th>Ward</th><th>สถานะ</th><th>Admin</th></tr>';
      d.aprRecent.forEach(function(r){
        html += `<tr><td style="white-space:nowrap">${r.timestamp}</td><td style="font-size:11px">${r.requestId}</td><td>${r.equipmentSubId}</td><td>${r.requesterName}</td><td>${r.requesterWard}</td><td><span class="badge ${r.status}">${r.status}</span></td><td>${r.adminName||'-'}</td></tr>`;
      });
      html += '</table></div>';
    }
    document.getElementById('full-content').innerHTML = html;
  }

  if (tab==='steril') {
    // Reuse central view data but call getDashboardPublic for sterilization summary
    document.getElementById('full-content').innerHTML = '<div class="empty-state"><div class="icon">🔬</div>ดูที่แท็บ "จ่ายกลาง" ในการ login ด้วย role central</div>';
  }

  if (tab==='report') {
    // Queue summary
    let html = '<div class="section-title">คิวรออยู่แยกอุปกรณ์</div>';
    const qs = d.queueSummary||{};
    if (Object.keys(qs).length===0) { html += '<div class="empty-state"><div class="icon">✅</div>ไม่มีคิว</div>'; }
    else {
      html += '<div class="tbl-wrap"><table><tr><th>อุปกรณ์</th><th>จำนวนคิว</th></tr>';
      Object.entries(qs).forEach(function([eq,n]){ html += `<tr><td>${eq}</td><td>${n}</td></tr>`; });
      html += '</table></div>';
    }
    document.getElementById('full-content').innerHTML = html;
  }
}

// ═══════════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════════
function isoDate(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function formatTime(iso) {
  if (!iso) return '-';
  try { return new Date(iso).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}); }
  catch(e){ return iso; }
}
